# ---------------------------------------------
# Redis Cluster custom configuration
# ---------------------------------------------
# cluster 예제의 각 노드가 공유하는 핵심 설정입니다.
# 아래 기본값 표기는 Redis 7 계열 기준의 대표 기본값입니다.

# 노드 서비스 포트입니다.
# 기본값: 6379
port 7001

# cluster 모드를 활성화합니다.
# 기본값: no
cluster-enabled yes

# cluster 메타데이터 파일입니다.
# 기본값: nodes.conf
cluster-config-file /data/nodes.conf

# 노드 장애 감지 timeout 입니다.
# 기본값: 15000
cluster-node-timeout 5000

# AOF 활성화 여부입니다.
# 기본값: no
appendonly yes

# 데이터 파일 경로입니다.
# 기본값: 현재 작업 디렉터리
dir /data

# 외부 통신을 위해 모든 인터페이스에 바인딩합니다.
# 기본값: bind 127.0.0.1 -::1
bind 0.0.0.0

# cluster 예제에서는 외부 통신을 위해 보호 모드를 끕니다.
# 기본값: yes
protected-mode no

# 클러스터에서 다른 노드와 클라이언트에 광고할 주소입니다.
# 기본값: 미설정
cluster-announce-ip 172.31.0.11
cluster-announce-port 7001
cluster-announce-bus-port 17001
cluster-announce-hostname localhost

# endpoint 타입입니다.
# 기본값: ip
cluster-preferred-endpoint-type hostname
