services:
  redis-node-1:
    image: redis:${REDIS_VERSION:-7.2.4}
    container_name: redis-node-1
    env_file:
      - .env
    command: ["/bin/sh", "/usr/local/bin/bootstrap-config.sh", "/seed/redis", "/usr/local/etc/redis", "redis.conf"]
    volumes:
      - ./conf/redis-node-1:/seed/redis:ro
      - redis_node_1_config:/usr/local/etc/redis
      - redis_node_1_data:/data
      - ./scripts/bootstrap-config.sh:/usr/local/bin/bootstrap-config.sh:ro
    ports:
      - "${REDIS_NODE_1_PORT:-7001}:7001"
      - "${REDIS_NODE_1_BUS_PORT:-17001}:17001"
    networks:
      redis_cluster_network:
        ipv4_address: 172.31.0.11

  redis-node-2:
