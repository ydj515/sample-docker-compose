# ---------------------------------------------
# Redis Sentinel custom configuration
# ---------------------------------------------
# sentinel 예제에서 master 감시와 failover 정책을 정의합니다.
# 아래 기본값 표기는 Redis 7 계열 기준의 대표 기본값입니다.

# sentinel 포트입니다.
# 기본값: 26379
port 26379

# 외부 통신을 위해 모든 인터페이스에 바인딩합니다.
# 기본값: bind 127.0.0.1 -::1
bind 0.0.0.0

# sentinel 상태 파일 경로입니다.
# 기본값: 현재 작업 디렉터리
dir /tmp

# 감시할 master 와 quorum 입니다.
# 기본값: 미설정
sentinel monitor mymaster 172.30.0.10 6379 2

# master 장애로 판단하기 전 대기 시간입니다.
# 기본값: 30000
sentinel down-after-milliseconds mymaster 5000

# failover 중 동시에 동기화할 replica 수입니다.
# 기본값: 1
sentinel parallel-syncs mymaster 1

# failover 전체 timeout 입니다.
# 기본값: 180000
sentinel failover-timeout mymaster 10000
