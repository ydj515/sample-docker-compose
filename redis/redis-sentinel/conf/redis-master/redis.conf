# ---------------------------------------------
# Redis custom configuration
# ---------------------------------------------
# sentinel 예제의 master 노드 설정입니다.
# 아래 기본값 표기는 Redis 7 계열 기준의 대표 기본값입니다.

# sentinel / replica 와 통신하기 위해 외부 인터페이스에 바인딩합니다.
# 기본값: bind 127.0.0.1 -::1
bind 0.0.0.0

# 샘플 네트워크에서는 외부 접근을 위해 보호 모드를 끕니다.
# 기본값: yes
protected-mode no

# 서비스 포트입니다.
# 기본값: 6379
port 6379

# 데이터 파일 경로입니다.
# 기본값: 현재 작업 디렉터리
dir /data

# AOF 활성화 여부입니다.
# 기본값: no
appendonly yes

# 메모리 제한 정책은 운영 캐시에서 자주 확인합니다.
# 기본값: maxmemory 미설정, maxmemory-policy noeviction
# maxmemory 1gb
# maxmemory-policy allkeys-lru
