version: "3.9"

services:
  redis-master:
    image: redis:7.2.4
    container_name: redis-master
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    ports:
      - "6379:6379"
    volumes:
      - ./conf/redis-master:/usr/local/etc/redis
      - redis_master_data:/data
    networks:
      redis_sentinel_network:
        ipv4_address: 172.30.0.10

  redis-replica-1:
    image: redis:7.2.4
    container_name: redis-replica-1
    depends_on:
      - redis-master
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    ports:
      - "6380:6379"
    volumes:
      - ./conf/redis-replica-1:/usr/local/etc/redis
      - redis_replica_1_data:/data
    networks:
      redis_sentinel_network:
        ipv4_address: 172.30.0.11

  redis-replica-2:
    image: redis:7.2.4
    container_name: redis-replica-2
    depends_on:
      - redis-master
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    ports:
      - "6381:6379"
    volumes:
      - ./conf/redis-replica-2:/usr/local/etc/redis
      - redis_replica_2_data:/data
    networks:
      redis_sentinel_network:
        ipv4_address: 172.30.0.12

  sentinel-1:
    image: redis:7.2.4
    container_name: redis-sentinel-1
    depends_on:
      - redis-master
    ports:
      - "26379:26379"
    command: ["redis-server", "/etc/redis-sentinel/sentinel.conf", "--sentinel"]
    volumes:
      - ./sentinel/sentinel-1:/etc/redis-sentinel
    networks:
      redis_sentinel_network:
        ipv4_address: 172.30.0.21

  sentinel-2:
    image: redis:7.2.4
    container_name: redis-sentinel-2
    depends_on:
      - redis-master
    ports:
      - "26380:26379"
    command: ["redis-server", "/etc/redis-sentinel/sentinel.conf", "--sentinel"]
    volumes:
      - ./sentinel/sentinel-2:/etc/redis-sentinel
    networks:
      redis_sentinel_network:
        ipv4_address: 172.30.0.22

  sentinel-3:
    image: redis:7.2.4
    container_name: redis-sentinel-3
    depends_on:
      - redis-master
    ports:
      - "26381:26379"
    command: ["redis-server", "/etc/redis-sentinel/sentinel.conf", "--sentinel"]
    volumes:
      - ./sentinel/sentinel-3:/etc/redis-sentinel
    networks:
      redis_sentinel_network:
        ipv4_address: 172.30.0.23

networks:
  redis_sentinel_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/24

volumes:
  redis_master_data:
  redis_replica_1_data:
  redis_replica_2_data:
