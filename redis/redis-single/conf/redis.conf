# ---------------------------------------------
# Redis custom configuration
# ---------------------------------------------
# 자주 조정하는 Redis 설정을 한곳에 모아둔 샘플입니다.
# 실제로 적용할 값은 필요한 항목만 수정해서 사용하면 됩니다.
#
# 운영 관점에서 보면 보통 아래 순서로 먼저 확인합니다.
# 1. bind / protected-mode / ACL 이 노출 방식과 맞는지
# 2. RDB / AOF 정책이 durability 요구사항과 맞는지
# 3. 메모리 제한과 eviction 정책이 필요한지
# 4. slowlog / latency 분석이 가능한지
#
# 아래 기본값 표기는 Redis 7 계열 기준의 대표 기본값입니다.

# 외부 접속을 허용하기 위해 모든 인터페이스에 바인딩합니다.
# 기본값: bind 127.0.0.1 -::1
bind 0.0.0.0

# 외부 노출 환경에서는 보통 yes 를 유지합니다.
# 기본값: yes
protected-mode yes

# 서비스 포트입니다.
# 기본값: 6379
port 6379

# 데이터 파일 경로입니다.
# 기본값: 현재 작업 디렉터리
dir /data

# AOF 는 내구성 측면에서 가장 먼저 보는 옵션입니다.
# 기본값: no
appendonly yes

# AOF 파일명입니다.
# 기본값: appendonly.aof
appendfilename "appendonly.aof"

# RDB snapshot 조건입니다.
# 기본값: save 3600 1 300 100 60 10000
save 3600 1 300 100 60 10000

# 메모리 제한과 eviction 정책은 캐시 용도에서 특히 중요합니다.
# 기본값: maxmemory 미설정, maxmemory-policy noeviction
# maxmemory 1gb
# maxmemory-policy allkeys-lru

# ACL 파일 경로입니다.
# 기본값: 미설정
aclfile /usr/local/etc/redis/users.acl

# 로그 레벨입니다.
# 기본값: notice
loglevel notice

# 느린 명령 추적 시 참고할 수 있습니다.
# 기본값: slowlog-log-slower-than 10000, slowlog-max-len 128
# slowlog-log-slower-than 10000
# slowlog-max-len 128
