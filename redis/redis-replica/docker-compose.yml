version: '3.9'

services:
  redis-master:
    image: redis:7.2.4
    container_name: redis-master
    ports:
      - "6379:6379"

  redis-replica-1:
    image: redis:7.2.4
    container_name: redis-replica-1
    ports:
      - "6380:6379"
    command: redis-server --replicaof redis-master 6379
    depends_on:
      - redis-master

  redis-replica-2:
    image: redis:7.2.4
    container_name: redis-replica-2
    ports:
      - "6381:6379"
    command: redis-server --replicaof redis-master 6379
    depends_on:
      - redis-master
