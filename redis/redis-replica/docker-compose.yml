services:
  redis-master:
    image: redis:${REDIS_VERSION:-7.2.4}
    container_name: redis-master
    env_file:
      - .env
    ports:
      - "${REDIS_MASTER_PORT:-6379}:6379"

  redis-replica-1:
    image: redis:${REDIS_VERSION:-7.2.4}
    container_name: redis-replica-1
    env_file:
      - .env
    ports:
      - "${REDIS_REPLICA_1_PORT:-6380}:6379"
    command: redis-server --replicaof ${REDIS_MASTER_HOST:-redis-master} ${REDIS_MASTER_INTERNAL_PORT:-6379}
    depends_on:
      - redis-master

  redis-replica-2:
    image: redis:${REDIS_VERSION:-7.2.4}
    container_name: redis-replica-2
    env_file:
      - .env
    ports:
      - "${REDIS_REPLICA_2_PORT:-6381}:6379"
    command: redis-server --replicaof ${REDIS_MASTER_HOST:-redis-master} ${REDIS_MASTER_INTERNAL_PORT:-6379}
    depends_on:
      - redis-master
