name: metricbeat

metricbeat.config:
  modules:
    path: ${path.config}/modules.d/*.yml
    reload.enabled: false

metricbeat.autodiscover:
  providers:
    - type: docker
      hints.enabled: true

metricbeat.modules:
  - module: elasticsearch
    hosts: ["${ELASTICSEARCH_URL}"]
    username: metricbeat_internal
    password: ${METRICBEAT_INTERNAL_PASSWORD}
    metricsets:
      - cluster_stats
      - enrich
      - index
      - index_recovery
      - index_summary
      - node_stats
      - shard
    # 전용 master 노드가 있는 클러스터는 cluster scope가 권장됩니다.
    scope: cluster
    xpack.enabled: true
    period: ${METRICBEAT_STACK_PERIOD}
    enabled: true

  - module: logstash
    hosts: ["${LOGSTASH_MONITORING_URL}"]
    xpack.enabled: true
    period: ${METRICBEAT_STACK_PERIOD}
    enabled: true

  - module: kibana
    hosts: ["${KIBANA_INTERNAL_URL}"]
    username: metricbeat_internal
    password: ${METRICBEAT_INTERNAL_PASSWORD}
    xpack.enabled: true
    period: ${METRICBEAT_STACK_PERIOD}
    enabled: true

  - module: docker
    metricsets:
      - container
      - cpu
      - diskio
      - healthcheck
      - info
      - memory
      - network
    hosts: ["unix:///var/run/docker.sock"]
    period: ${METRICBEAT_DOCKER_PERIOD}
    enabled: true

processors:
  - add_docker_metadata: ~
  - add_host_metadata: ~

output.elasticsearch:
  hosts: ["${ELASTICSEARCH_URL}"]
  username: metricbeat_internal
  password: ${METRICBEAT_INTERNAL_PASSWORD}

http:
  enabled: true
  host: 0.0.0.0
  port: ${METRICBEAT_HTTP_PORT}
