input {
  beats {
    port => "${LOGSTASH_BEATS_PORT}"
  }

  tcp {
    port => "${LOGSTASH_TCP_PORT}"
    codec => line
  }
}

filter {
  # JSON 로그는 그대로 파싱합니다.
  if [message] =~ "^{.*}$" {
    json {
      source => "message"
      target => "parsed_json"
      skip_on_invalid_json => true
    }

    if [parsed_json][@timestamp] {
      date {
        match => ["[parsed_json][@timestamp]", "ISO8601"]
        target => "@timestamp"
      }
    }

    mutate {
      rename => { "[parsed_json][level]" => "[log][level]" }
      rename => { "[parsed_json][service]" => "[service][name]" }
      rename => { "[parsed_json][message]" => "message" }
      rename => { "[parsed_json][trace_id]" => "trace_id" }
      rename => { "[parsed_json][amount]" => "amount" }
    }
  } else {
    # 일반 텍스트 로그는 고정 폭 포맷이라 dissect가 운영 환경에서 더 안정적입니다.
    dissect {
      mapping => {
        "message" => "%{log_timestamp} %{log_level} [%{service_name}] %{parsed_message}"
      }
      tag_on_failure => ["_text_parse_failure"]
    }

    # 샘플 grok 필터: 잘 구조화된 텍스트 메시지에서 추가 필드를 추출합니다.
    if [parsed_message] =~ "^Started HTTP server on :" {
      grok {
        match => {
          "parsed_message" => "Started HTTP server on :%{NUMBER:[service][port]:int}"
        }
        tag_on_failure => []
      }
    } else if [parsed_message] =~ "^Slow query detected in " {
      grok {
        match => {
          "parsed_message" => "Slow query detected in %{JAVACLASS:[event][reason]}"
        }
        tag_on_failure => []
      }
      mutate {
        add_field => {
          "[event][category]" => "database"
          "[event][type]" => "slow_query"
        }
      }
    }

    if [log_timestamp] {
      date {
        match => ["log_timestamp", "ISO8601"]
        target => "@timestamp"
      }
    }

    mutate {
      rename => { "log_level" => "[log][level]" }
      rename => { "service_name" => "[service][name]" }
      rename => { "parsed_message" => "message" }
    }
  }

  mutate {
    remove_field => ["log_timestamp", "parsed_json", "host"]
  }
}

output {
  elasticsearch {
    hosts => ["${ELASTICSEARCH_URL}"]
    user => "logstash_internal"
    password => "${LOGSTASH_INTERNAL_PASSWORD}"
    index => "${LOGSTASH_INDEX_PREFIX}-%{+YYYY.MM.dd}"
    ilm_enabled => false
  }

  stdout {
    codec => rubydebug
  }
}
