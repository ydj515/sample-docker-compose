  kafka-ui:
    image: ${KAFKA_UI_IMAGE}
    ports:
      - "${KAFKA_UI_PORT}:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: "${KAFKA_CLUSTER_NAME}"
      KAFKA_CLUSTERS_0_BOOTSTRAP_SERVERS: "kafka:${KAFKA_INTERNAL_PORT}"
      KAFKA_CLUSTERS_0_ZOOKEEPER_CONNECT: "zookeeper:${ZOOKEEPER_PORT}"
    depends_on:
      kafka:
        condition: service_healthy
      zookeeper:
        condition: service_healthy
    networks:
      - single-kafka-network

networks:
  single-kafka-network:
    driver: bridge

