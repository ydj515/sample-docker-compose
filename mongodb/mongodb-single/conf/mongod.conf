# ---------------------------------------------
# MongoDB custom configuration
# ---------------------------------------------
# 자주 조정하는 MongoDB 설정을 한곳에 모아둔 샘플입니다.
# 실제로 적용할 값은 필요한 항목만 주석 해제해서 사용하면 됩니다.
#
# 운영 관점에서 보면 보통 아래 순서로 먼저 확인합니다.
# 1. bindIp / port / 인증 정책이 외부 노출 방식과 맞는지
# 2. WiredTiger cache, journal, profiling 이 workload 에 맞는지
# 3. 느린 쿼리 분석과 로그 verbosity 가 충분한지
# 4. replica set / sharding 사용 시 관련 옵션이 명확한지
#
# 아래 기본값 표기는 MongoDB 8 계열 기준의 대표 기본값입니다.

storage:
  # 데이터 파일 경로입니다.
  # 기본값: /data/db
  dbPath: /data/db

  # journal 은 단일 노드 운영에서도 내구성에 중요한 항목입니다.
  # 기본값: enabled
  # journal:
  #   enabled: true

  # WiredTiger cache 는 메모리 사용량과 직결됩니다.
  # 기본값: 내부 계산식 사용
  # wiredTiger:
  #   engineConfig:
  #     cacheSizeGB: 1

systemLog:
  # 컨테이너 환경에서는 stdout/stderr 로 로그를 보는 편이 단순합니다.
  # 기본값: destination = file, logAppend = false, verbosity = 0
  destination: file
  path: /proc/1/fd/1
  logAppend: true
  verbosity: 0

net:
  # 샘플에서는 외부 접속을 위해 모든 인터페이스에 바인딩합니다.
  # 기본값: bindIp = 127.0.0.1, port = 27017
  bindIp: 0.0.0.0
  port: 27017

  # 최대 동시 연결 수입니다.
  # 기본값: 1000000
  # maxIncomingConnections: 20000

  # 압축은 네트워크 대역폭과 CPU 사용량의 trade-off 입니다.
  # 기본값: snappy,zstd,zlib
  # compression:
  #   compressors: snappy,zstd,zlib

processManagement:
  # 타임존 정보 경로입니다.
  # 기본값: OS/패키지 기본 경로 사용
  timeZoneInfo: /usr/share/zoneinfo

operationProfiling:
  # 느린 연산 추적 시 가장 자주 보는 옵션입니다.
  # 기본값: mode = off, slowOpThresholdMs = 100
  mode: "off"
  slowOpThresholdMs: 100

# security:
#   # root 계정 환경변수를 사용하는 샘플이라 authorization 은 엔트리포인트 흐름을 따릅니다.
#   # 기본값: disabled
#   authorization: enabled

# 운영 시작점 예시
# storage:
#   wiredTiger:
#     engineConfig:
#       cacheSizeGB: 1
# operationProfiling:
#   mode: slowOp
#   slowOpThresholdMs: 200
