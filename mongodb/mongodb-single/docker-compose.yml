services:
  mongo:
    image: mongo:${MONGO_VERSION:-8.0.19}
    restart: unless-stopped
    networks:
      - mongodb_single_network
    env_file:
      - .env
    environment:
      # 초기 관리자 계정을 .env에서 주입합니다.
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mongosh \"mongodb://$${MONGO_INITDB_ROOT_USERNAME}:$${MONGO_INITDB_ROOT_PASSWORD}@127.0.0.1:27017/admin\" --quiet --eval \"db.adminCommand('ping').ok\" | grep 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  mongo-express:
    image: mongo-express:${MONGO_EXPRESS_VERSION:-1.0.2}
    restart: unless-stopped
    networks:
      - mongodb_single_network
    env_file:
      - .env
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      # mongo 서비스명으로 같은 compose 네트워크 내부에서 연결합니다.
      ME_CONFIG_MONGODB_SERVER: mongo
      ME_CONFIG_MONGODB_PORT: 27017
      ME_CONFIG_MONGODB_ENABLE_ADMIN: "true"
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_ROOT_USERNAME}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_ROOT_PASSWORD}
      ME_CONFIG_BASICAUTH_USERNAME: ${MONGO_EXPRESS_BASICAUTH_USERNAME}
      ME_CONFIG_BASICAUTH_PASSWORD: ${MONGO_EXPRESS_BASICAUTH_PASSWORD}
    ports:
      - "${MONGO_EXPRESS_PORT:-8081}:8081"

volumes:
  mongo_data:

networks:
  mongodb_single_network:
    driver: bridge
