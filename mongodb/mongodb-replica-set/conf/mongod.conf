# ---------------------------------------------
# MongoDB custom configuration
# ---------------------------------------------
# 자주 조정하는 MongoDB 설정을 한곳에 모아둔 샘플입니다.
# 실제로 적용할 값은 필요한 항목만 주석 해제해서 사용하면 됩니다.
#
# 운영 관점에서 보면 보통 아래 순서로 먼저 확인합니다.
# 1. bindIp / port / keyFile / replica set 구성이 맞는지
# 2. WiredTiger cache 와 journal 이 workload 에 맞는지
# 3. profiling 과 로그 수준이 문제 분석에 충분한지
# 4. election / heartbeat / oplog 관련 운영 정책이 필요한지
#
# 아래 기본값 표기는 MongoDB 8 계열 기준의 대표 기본값입니다.

storage:
  # 데이터 파일 경로입니다.
  # 기본값: /data/db
  dbPath: /data/db

  # journal 은 replica set 환경에서도 기본 내구성의 핵심입니다.
  # 기본값: enabled
  # journal:
  #   enabled: true

  # WiredTiger cache 는 메모리 제한과 함께 봐야 합니다.
  # 기본값: 내부 계산식 사용
  # wiredTiger:
  #   engineConfig:
  #     cacheSizeGB: 1

systemLog:
  # 컨테이너 환경에서는 stdout/stderr 로 로그를 보는 편이 단순합니다.
  # 기본값: destination = file, logAppend = false, verbosity = 0
  destination: file
  path: /proc/1/fd/1
  logAppend: true
  verbosity: 0

net:
  # replica set 내부 통신과 외부 접근을 위해 모든 인터페이스에 바인딩합니다.
  # 기본값: bindIp = 127.0.0.1, port = 27017
  bindIp: 0.0.0.0
  port: 27017

replication:
  # replica set 이름입니다.
  # 기본값: 미설정
  replSetName: rs0

security:
  # keyFile 기반 내부 인증 경로입니다.
  # 기본값: 미설정
  keyFile: /tmp/mongodb-keyfile

  # root 계정 환경변수를 사용하는 샘플이라 authorization 은 엔트리포인트 흐름을 따릅니다.
  # 기본값: disabled
  # authorization: enabled

processManagement:
  # 타임존 정보 경로입니다.
  # 기본값: OS/패키지 기본 경로 사용
  timeZoneInfo: /usr/share/zoneinfo

operationProfiling:
  # 느린 연산 추적 시 가장 자주 보는 옵션입니다.
  # 기본값: mode = off, slowOpThresholdMs = 100
  mode: "off"
  slowOpThresholdMs: 100

# 운영 시작점 예시
# storage:
#   wiredTiger:
#     engineConfig:
#       cacheSizeGB: 1
# operationProfiling:
#   mode: slowOp
#   slowOpThresholdMs: 200
