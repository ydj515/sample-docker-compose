stream_over_http_enabled: true

server:
  http_listen_port: 3200
  log_level: info

query_frontend:
  search:
    duration_slo: 5s
    throughput_bytes_slo: 1.073741824e+09
  trace_by_id:
    duration_slo: 5s

distributor:
  receivers:                           # this configuration will listen on all ports and protocols that tempo is capable of.
    jaeger:                            # the receives all come from the OpenTelemetry collector.  more configuration information can
      protocols:                       # be found there: https://github.com/open-telemetry/opentelemetry-collector/tree/main/receiver
        thrift_http:                   #
        grpc:                          # for a production deployment you should only enable the receivers you need!
        thrift_binary:
        thrift_compact:
    zipkin:
    otlp:
      protocols:
        http:
          endpoint: 0.0.0.0:4318
        grpc:
          endpoint: 0.0.0.0:4317
    opencensus:

ingester:
  # 로컬 개발 권장값: 5m
  # Tempo 기본값: 30m
  max_block_duration: 5m
  # 로컬 개발 권장값: 524288000(500MB)
  # Tempo 기본값: 524288000(500MB)
  max_block_bytes: 524288000

compactor:
  compaction:
    # 로컬 개발 권장 기본값: 168h(7d)
    # Tempo 기본값: 336h(14d)
    # 이 값을 넘긴 trace block은 compactor가 정리합니다.
    block_retention: 168h
    # 로컬 개발 기본값: 1h
    # Tempo 기본값: 1h
    # compacted block 재정리 주기를 너무 길게 두지 않기 위한 보조 설정입니다.
    compacted_block_retention: 1h
    # 로컬 개발 권장값: 5368709120(5GB)
    # Tempo 기본값: 107374182400(100GB)
    # compacted block 하나의 최대 크기입니다. 전체 디스크 상한은 아닙니다.
    max_block_bytes: 5368709120

metrics_generator:
  registry:
    external_labels:
      source: tempo
      cluster: docker-compose
  storage:
    path: /tmp/tempo/generator/wal
    remote_write:
      - url: http://prometheus:9090/api/v1/write
        send_exemplars: true

storage:
  trace:
    backend: local                     # backend configuration to use
    wal:
      path: /tmp/tempo/wal             # where to store the the wal locally
    local:
      path: /tmp/tempo/blocks

overrides:
  defaults:
    metrics_generator:
      processors: [service-graphs, span-metrics] # enables metrics generator
