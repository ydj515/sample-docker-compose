name: ${COMPOSE_PROJECT_NAME:-otel-demo}

services:
  otel-collector:
    image: ${COLLECTOR_CONTRIB_IMAGE:-otel/opentelemetry-collector-contrib:0.147.0}
    restart: unless-stopped
    volumes:
      - ./collector/otel-config.yaml:/etc/otelcol-contrib/config.yaml
      # - ./secretkey/server.key:/etc/otelcol-contrib/server.key
      # - ./secretkey/server.crt:/etc/otelcol-contrib/server.crt
    ports:
      - "${OTEL_COLLECTOR_HOST_PORT_PPROF:-1888}:1888" # pprof extension
      - "${OTEL_COLLECTOR_HOST_PORT_METRICS:-8888}:8888" # Prometheus metrics exposed by the Collector
      - "${OTEL_COLLECTOR_HOST_PORT_EXPORTER_METRICS:-8889}:8889" # Prometheus exporter metrics
      - "${OTEL_COLLECTOR_HOST_PORT_HEALTHCHECK:-13133}:13133" # health_check extension
      - "${OTEL_COLLECTOR_HOST_PORT_GRPC:-4317}:4317" # OTLP gRPC receiver
      - "${OTEL_COLLECTOR_HOST_PORT_HTTP:-4318}:4318" # OTLP http receiver
      - "${OTEL_COLLECTOR_HOST_PORT_ZPAGES:-55679}:55679" # zpages
    depends_on:
      - jaeger
      - prometheus
      - tempo
      - loki
    networks:
      - default

  jaeger:
    image: ${JAEGER_IMAGE:-jaegertracing/jaeger:2.16.0}
    restart: unless-stopped
    user: "0:0"
    command:
      - --config
      - /etc/jaeger/jaeger.yaml
    ports:
      - "${JAEGER_HOST_PORT_UI:-16686}:16686" # Jaeger UI
    expose:
      - "4317" # grpc
      - "4318" # http
    volumes:
      - ./jaeger/jaeger.yaml:/etc/jaeger/jaeger.yaml
      - jaeger-data:/badger
    networks:
      - default

  prometheus:
    image: ${PROMETHEUS_IMAGE:-prom/prometheus:v2.48.0}
    restart: unless-stopped
    ports:
      - "${PROMETHEUS_HOST_PORT:-9090}:9090"
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --web.enable-remote-write-receiver
      - --enable-feature=otlp-write-receiver # 추후 버전에선 --web.enable-otlp-receiver
      - --enable-feature=exemplar-storage
      - --storage.tsdb.path=/prometheus
      # 로컬 개발 권장값: 15d
      # Prometheus 공식 time 기본값: 15d
      - --storage.tsdb.retention.time=15d
      # 로컬 개발 권장값: 3GB
      # Prometheus 공식 size 기본값: 0(B, 비활성화)
      # size는 Prometheus 데이터 볼륨의 80~85% 이하 권장
      - --storage.tsdb.retention.size=3GB
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    networks:
      - default

  tempo:
    image: ${TEMPO_IMAGE:-grafana/tempo:2.10.2}
    restart: unless-stopped
    user: "0:0"
    command:
      - -config.file=/etc/tempo.yaml
    ports:
      - "${TEMPO_HOST_PORT:-3200}:3200"
    expose:
      - "4317" # grpc
      - "4318" # http
    volumes:
      - ./tempo/tempo.yaml:/etc/tempo.yaml
      - tempo-data:/tmp/tempo
    networks:
      - default

  loki:
    image: ${LOKI_IMAGE:-grafana/loki:3.0.0}
    restart: unless-stopped
    user: "0:0"
    ports:
      - "${LOKI_HOST_PORT:-3100}:3100"
    command:
      - -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./loki/loki.yaml:/etc/loki/local-config.yaml
      - loki-data:/tmp/loki
    networks:
      - default

  alloy:
    image: ${ALLOY_IMAGE:-grafana/alloy:v1.12.1}
    restart: unless-stopped
    user: "0:0"
    ports:
      - "${ALLOY_HOST_PORT:-12345}:12345"
    volumes:
      - ${ALLOY_LOG_PATH:-/var/log}:/var/log # 실제 로그 파일 경로와 alloy 설정의 __path__ 경로를 맞춰주세요.
      # - /opt/homebrew/Cellar/wildfly-as/35.0.1/libexec/standalone/log:/var/log/wildfly
      - ./alloy/config.alloy:/etc/alloy/config.alloy
      - alloy-data:/var/lib/alloy/data
    command:
      - run
      - --server.http.listen-addr=0.0.0.0:12345
      - --storage.path=/var/lib/alloy/data
      - /etc/alloy/config.alloy
    depends_on:
      - loki
    networks:
      - default

  grafana:
    image: ${GRAFANA_IMAGE:-grafana/grafana:11.5.2}
    restart: unless-stopped
    ports:
      - "${GRAFANA_HOST_PORT:-3000}:3000"
    environment:
      GF_FEATURE_TOGGLES_ENABLE: ${GRAFANA_FEATURE_TOGGLES_ENABLE:-traceqlEditor}
    volumes:
      - ./grafana/grafana.ini:/etc/grafana/grafana.ini
      - ./grafana/provisioning/:/etc/grafana/provisioning/
      - ./grafana/alerting/:/etc/grafana/provisioning/alerting/
      - grafana-data:/var/lib/grafana
    depends_on:
      - otel-collector
      - prometheus
      - tempo
      - loki
    networks:
      - default

  node-exporter:
    image: ${NODE_EXPORTER_IMAGE:-prom/node-exporter:v1.9.1}
    restart: unless-stopped
    ports:
      - "${NODE_EXPORTER_HOST_PORT:-9100}:9100"
    networks:
      - default
    # command:
    #   - '--path.rootfs=/host'
    # network_mode: host
    # pid: host
    # volumes:
    #   - '/:/host:ro,rslave'

volumes:
  grafana-data:
    name: ${GRAFANA_VOLUME_NAME:-otel-grafana-data}
  prometheus-data:
    name: ${PROMETHEUS_VOLUME_NAME:-otel-prometheus-data}
  tempo-data:
    name: ${TEMPO_VOLUME_NAME:-otel-tempo-data}
  loki-data:
    name: ${LOKI_VOLUME_NAME:-otel-loki-data}
  jaeger-data:
    name: ${JAEGER_VOLUME_NAME:-otel-jaeger-data}
  alloy-data:
    name: ${ALLOY_VOLUME_NAME:-otel-alloy-data}

networks:
  default:
    name: ${OTEL_NETWORK_NAME:-otel-demo}
    driver: bridge
