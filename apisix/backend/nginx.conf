server {
    listen 8080;
    server_name _;

    default_type application/json;

    location = /api/health {
        return 200 '{"status":"UP","service":"backend"}';
    }

    location /api/ {
        return 200 '{"message":"backend api ok","service":"backend"}';
    }

    location / {
        return 200 '{"message":"backend root ok","service":"backend"}';
    }
}
