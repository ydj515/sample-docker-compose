# ---------------------------------------------
# PostgreSQL custom configuration
# ---------------------------------------------
# 자주 조정하는 PostgreSQL 설정을 한곳에 모아둔 샘플입니다.
# 실제로 적용할 값은 필요한 항목만 주석 해제해서 사용하면 됩니다.
#
# 운영 관점에서 보면 보통 아래 순서로 먼저 확인합니다.
# 1. 연결 수와 memory 관련 설정이 workload 에 맞는지
# 2. WAL / checkpoint / autovacuum 이 쓰기 패턴에 맞는지
# 3. log_min_duration_statement, log_lock_waits 로 관측이 가능한지
# 4. timeout 과 확장 설정이 애플리케이션 특성과 맞는지
#
# "좋은 값"은 절대값보다도 서버 메모리, 스토리지 성능, 애플리케이션 커넥션 풀,
# 쿼리 패턴, 복제/CDC 사용 여부에 따라 달라집니다.
#
# 아래 기본값 표기는 PostgreSQL 17 기준입니다.
#
# 적용 방법
# - docker-compose.yml 에서 이 파일을 config_file 로 지정해 사용합니다.
# - 값을 바꾼 뒤에는 보통 컨테이너 재시작이 필요합니다.
# - 일부 설정은 reload 로 반영되지만, 메모리/프로세스 관련 항목은 재시작이 필요합니다.

# ---------------------------------------------
# 기본 접속 / 로케일
# ---------------------------------------------
# 컨테이너 외부에서 접속할 수 있도록 모든 인터페이스에 바인딩합니다.
listen_addresses = '*'

# 로그와 세션 타임존을 서울로 맞춥니다.
timezone = 'Asia/Seoul'
log_timezone = 'Asia/Seoul'

# 기본 문자셋 / 로케일은 initdb 시점에 결정되는 경우가 많습니다.
# 아래 항목은 참고용이며, 필요할 때만 검토하세요.
# PostgreSQL 은 MySQL 과 다르게 cluster 생성 시 locale 영향이 더 크게 남는 편입니다.
# client_encoding = 'UTF8'
# lc_messages = 'C'
# lc_monetary = 'C'
# lc_numeric = 'C'
# lc_time = 'C'

# ---------------------------------------------
# 연결 수 / 메모리
# ---------------------------------------------
# 동시에 열 수 있는 최대 연결 수입니다.
# 애플리케이션 풀 사이즈와 같이 보지 않으면 불필요하게 메모리를 많이 잡아먹을 수 있습니다.
# 운영에서는 "DB 최대 연결 수 > 앱 풀 총합" 정도로만 여유를 두는 편이 일반적입니다.
# 연결 수를 크게 늘리기 전에 pgbouncer 같은 pooler 사용 여부도 함께 검토합니다.
# 기본값: 100
# max_connections = 100

# PostgreSQL 이 캐시로 직접 들고 있을 메모리입니다.
# 보통 서버 메모리의 20~25% 수준에서 시작합니다.
# 컨테이너 메모리 제한이 있다면 반드시 그 제한을 기준으로 계산해야 합니다.
# 기본값: 128MB
# shared_buffers = 128MB

# 정렬, 해시, 집계 같은 작업 1회당 사용할 수 있는 메모리입니다.
# 연결 수가 많을수록 과하게 키우면 총 메모리 사용량이 급증할 수 있습니다.
# 느린 쿼리를 메모리로만 덮으려 하지 말고, 먼저 실행계획과 인덱스를 보는 편이 맞습니다.
# 기본값: 4MB
# work_mem = 4MB

# VACUUM, CREATE INDEX, ALTER TABLE 같은 유지보수 작업용 메모리입니다.
# 인덱스 생성/리인덱스/대량 VACUUM 이 잦다면 체감되는 항목입니다.
# 기본값: 64MB
# maintenance_work_mem = 64MB

# OS 페이지 캐시에 얼마나 데이터가 남아 있을지 추정하는 값입니다.
# 쿼리 플래너가 실행 계획을 고를 때 참고합니다.
# 실제로 메모리를 할당하는 값이 아니라 planner 힌트 성격에 가깝습니다.
# 기본값: 4GB
# effective_cache_size = 4GB

# ---------------------------------------------
# WAL / 체크포인트
# ---------------------------------------------
# 복제나 CDC 같은 기능을 쓰면 wal_level 을 logical 또는 replica 로 검토합니다.
# logical decoding, Debezium 류 CDC, logical replication 을 쓰면 logical 쪽을 봐야 합니다.
# 기본값: replica
# wal_level = replica

# 체크포인트 간 최대 시간입니다.
# 너무 짧으면 디스크 flush 가 자주 일어나고, 너무 길면 장애 복구 시간이 늘어납니다.
# 쓰기량이 높은 서비스에서 checkpoint spike 가 보이면 먼저 같이 보는 항목 중 하나입니다.
# 기본값: 5min
# checkpoint_timeout = 5min

# 체크포인트로 인해 생성되는 WAL 양의 상한 / 하한입니다.
# 쓰기량이 많다면 max_wal_size 조정이 체감되는 경우가 많습니다.
# max_wal_size 를 키우면 checkpoint 압박은 줄 수 있지만, 장애 복구 시간은 늘 수 있습니다.
# 기본값: max_wal_size = 1GB, min_wal_size = 80MB
# max_wal_size = 1GB
# min_wal_size = 80MB

# 한 번의 체크포인트를 얼마나 완만하게 분산할지 지정합니다.
# 보통 0.9 근처가 무난한 시작점으로 자주 언급됩니다.
# 기본값: 0.9
# checkpoint_completion_target = 0.9

# ---------------------------------------------
# Autovacuum
# ---------------------------------------------
# 업데이트 / 삭제가 있는 테이블의 dead tuple 정리를 자동 수행합니다.
# 운영 환경에서는 특별한 이유가 없으면 끄지 않는 것이 일반적입니다.
# PostgreSQL 운영 이슈의 꽤 많은 비중이 사실상 autovacuum 관찰/튜닝과 연결됩니다.
# 기본값: on
# autovacuum = on

# autovacuum 워커 개수입니다.
# 테이블이 많거나 쓰기 부하가 높으면 병목 여부를 봐가며 늘립니다.
# worker 를 늘리기 전, 실제로 어떤 테이블이 밀리는지 pg_stat_* 뷰로 확인하는 편이 좋습니다.
# 기본값: 3
# autovacuum_max_workers = 3

# autovacuum 실행 간격입니다.
# 지나치게 길면 dead tuple 이 쌓이고, 너무 짧으면 background I/O 부담이 커질 수 있습니다.
# 기본값: 1min
# autovacuum_naptime = 1min

# 테이블 크기 대비 얼마나 변경이 쌓이면 vacuum 을 시작할지 정합니다.
# 큰 테이블은 scale factor 를 낮추는 것이 보통 더 안정적입니다.
# 큰 OLTP 테이블은 전역값 대신 테이블별 storage parameter 로 따로 조정하는 경우도 많습니다.
# 기본값: scale_factor = 0.2, threshold = 50
# autovacuum_vacuum_scale_factor = 0.2
# autovacuum_vacuum_threshold = 50

# analyze 실행 기준입니다.
# 통계가 늦게 갱신되면 쿼리 플랜이 나빠질 수 있습니다.
# insert/update 패턴이 빠르게 바뀌는 테이블은 analyze 기준도 같이 보는 편이 좋습니다.
# 기본값: scale_factor = 0.1, threshold = 50
# autovacuum_analyze_scale_factor = 0.1
# autovacuum_analyze_threshold = 50

# vacuum 비용 제어입니다.
# 과도한 I/O 를 피하고 싶을 때 조정합니다.
# 비용 제한을 너무 보수적으로 두면 cleanup 이 계속 밀릴 수 있습니다.
# 기본값: cost_limit = -1, cost_delay = 2ms
# autovacuum_vacuum_cost_limit = -1
# autovacuum_vacuum_cost_delay = 2ms

# ---------------------------------------------
# 쿼리 플래너 / I/O 추정
# ---------------------------------------------
# SSD 환경에서는 random_page_cost 를 HDD 기본값보다 낮춰 잡는 경우가 많습니다.
# 실제 스토리지 성능과 shared_buffers / OS cache 상황에 따라 체감이 달라집니다.
# 기본값: 4
# random_page_cost = 1.1

# CPU 비용 추정값입니다. 일반적으로 자주 바꾸지는 않지만 튜닝 시 참고합니다.
# 기본값을 함부로 바꾸기보다, 특수한 workload 에서 planner 가 지속적으로 빗나갈 때 검토합니다.
# 기본값: cpu_tuple_cost = 0.01, cpu_index_tuple_cost = 0.005, cpu_operator_cost = 0.0025
# cpu_tuple_cost = 0.01
# cpu_index_tuple_cost = 0.005
# cpu_operator_cost = 0.0025

# 순차 스캔을 억지로 막고 싶을 때 임시로 참고할 수 있습니다.
# 운영에서 상시 변경하는 것은 보통 권장되지 않습니다.
# 문제 분석용 세션 한정으로만 쓰고, 장기 설정으로 두는 것은 피하는 편이 좋습니다.
# 기본값: on
# enable_seqscan = on

# ---------------------------------------------
# 로깅
# ---------------------------------------------
# 로그 출력 형식입니다. 컨테이너 로그 수집 시 stderr 를 그대로 쓰는 구성이 단순합니다.
# 기본값: off
logging_collector = off

# 느린 쿼리 추적 시 가장 자주 쓰는 옵션입니다.
# 500ms 이상 쿼리를 기록하려면 아래처럼 사용합니다.
# 운영 초기에 미리 켜두고 임계값을 보수적으로 잡아두면 장애 대응이 훨씬 수월합니다.
# 기본값: -1 (비활성)
# log_min_duration_statement = 500

# 체크포인트 로그를 보고 WAL / I/O 상태를 추적할 수 있습니다.
# checkpoint 가 몰리는지 파악할 때 유용합니다.
# 기본값: on
# log_checkpoints = on

# 접속 / 종료 로그가 필요할 때 사용합니다.
# 연결 폭증이나 누수 의심 상황에서 도움되지만, 로그량이 빠르게 늘 수 있습니다.
# 기본값: 둘 다 off
# log_connections = on
# log_disconnections = on

# 락 대기 로그입니다. 교착상태나 장시간 블로킹 분석에 유용합니다.
# 운영에서는 log_lock_waits 와 deadlock_timeout 조합을 자주 사용합니다.
# 기본값: log_lock_waits = off, deadlock_timeout = 1s
# log_lock_waits = on
# deadlock_timeout = 1s

# ---------------------------------------------
# timeout / 보호 장치
# ---------------------------------------------
# 오래 걸리는 쿼리를 강제로 종료합니다.
# API 서버 뒤에서는 무제한보다 제한을 두는 편이 안전한 경우가 많습니다.
# batch / admin 쿼리와 온라인 트래픽을 분리하지 않으면 너무 공격적인 값이 될 수 있습니다.
# 기본값: 0 (비활성)
# statement_timeout = 30s

# 락 획득 대기를 제한합니다.
# 락 재시도 전략과 함께 설계해야 의미가 있습니다.
# 기본값: 0 (비활성)
# lock_timeout = 5s

# 유휴 상태로 트랜잭션을 오래 붙잡는 세션을 정리합니다.
# PostgreSQL 운영에서 꼭 켜볼 만한 보호 장치 중 하나입니다.
# 기본값: 0 (비활성)
# idle_in_transaction_session_timeout = 60s

# 일반 idle 연결 종료 시간입니다.
# connection_reaping 이 필요한 환경에서 검토합니다.
# pooler 사용 여부와 함께 봐야 불필요한 연결 churn 을 피할 수 있습니다.
# 기본값: 0 (비활성)
# idle_session_timeout = 10min

# ---------------------------------------------
# 병렬 처리 / 백그라운드 작업
# ---------------------------------------------
# 병렬 쿼리 워커 수 제한입니다.
# CPU 코어 수와 실제 쿼리 패턴을 같이 보고 조정합니다.
# OLTP 서비스는 체감이 작을 수 있고, 분석성 쿼리 비중이 높은 쪽에서 더 의미가 큽니다.
# 기본값: max_worker_processes = 8, max_parallel_workers = 8, max_parallel_workers_per_gather = 2
# max_worker_processes = 8
# max_parallel_workers = 8
# max_parallel_workers_per_gather = 2

# ---------------------------------------------
# 확장 기능
# ---------------------------------------------
# pg_stat_statements 같은 확장을 쓰려면 shared_preload_libraries 설정이 필요합니다.
# 성능 분석을 시작할 때 가장 먼저 고려하는 확장 중 하나입니다.
# 기본값: 빈 문자열
# shared_preload_libraries = 'pg_stat_statements'

# pg_stat_statements 예시
# pg_stat_statements.max = 10000
# pg_stat_statements.track = all

# ---------------------------------------------
# 운영 시작점 예시
# ---------------------------------------------
# 아래는 "작은~중간 규모 단일 인스턴스"에서 자주 시작점으로 검토하는 예시입니다.
# 그대로 정답은 아니고, 메모리/디스크/복제 여부에 따라 반드시 조정해야 합니다.
#
# max_connections = 200
# shared_buffers = 1GB
# work_mem = 8MB
# maintenance_work_mem = 256MB
# effective_cache_size = 3GB
# max_wal_size = 2GB
# checkpoint_completion_target = 0.9
# autovacuum = on
# autovacuum_max_workers = 4
# log_min_duration_statement = 500
# log_lock_waits = on
# statement_timeout = 30s
# idle_in_transaction_session_timeout = 60s
